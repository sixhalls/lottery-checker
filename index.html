<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>中奖了吗？</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;color:#e0e0e0;padding:12px}
.container{max-width:480px;margin:0 auto}
.main-title{text-align:center;font-size:32px;font-weight:900;background:linear-gradient(90deg,#f5af19,#f12711);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;letter-spacing:3px}
.subtitle{text-align:center;color:#667;font-size:12px;margin-bottom:16px}
.tabs{display:flex;border-radius:10px;overflow:hidden;border:2px solid #2a3a5c;margin-bottom:14px}
.tab-btn{flex:1;padding:10px 0;text-align:center;font-size:16px;font-weight:700;cursor:pointer;border:none;background:#1a2744;color:#6b7fa3;transition:.2s}
.tab-btn.active-dlt{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff}
.tab-btn.active-ssq{background:linear-gradient(135deg,#1565c0,#2196f3);color:#fff}
.card{background:rgba(255,255,255,.05);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,.08)}
.card h3{font-size:14px;color:#8899aa;margin-bottom:10px;display:flex;align-items:center;gap:6px;justify-content:space-between}
.h3-left{display:flex;align-items:center;gap:6px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:400}
.badge-dlt{background:rgba(231,76,60,.2);color:#e74c3c}
.badge-ssq{background:rgba(33,150,243,.2);color:#2196f3}
.draw-period{font-size:18px;font-weight:700;color:#fff}
.draw-date{font-size:12px;color:#567;margin-bottom:10px}
.draw-balls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.ball{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;box-shadow:0 3px 8px rgba(0,0,0,.3)}
.ball-red{background:linear-gradient(135deg,#c0392b,#e74c3c)}
.ball-blue{background:linear-gradient(135deg,#1565c0,#2196f3)}
.ball-sep{color:#445;font-size:22px;margin:0 2px}
.no-data{color:#445;font-style:italic;font-size:13px}
.refresh-btn{padding:4px 14px;border-radius:8px;border:1px solid #2a3a5c;background:rgba(255,255,255,.06);color:#8899aa;cursor:pointer;font-size:12px;white-space:nowrap}
.refresh-btn:hover{background:rgba(255,255,255,.1)}
.ball-picker-label{font-size:12px;color:#6b7fa3;margin-bottom:6px;display:flex;justify-content:space-between}
.ball-picker{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pick-ball{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;border:2px solid transparent;user-select:none;-webkit-tap-highlight-color:transparent}
.pick-ball-red{background:rgba(231,76,60,.12);color:#c0392b;border-color:rgba(231,76,60,.25)}
.pick-ball-red.selected{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;border-color:#e74c3c;box-shadow:0 0 10px rgba(231,76,60,.4)}
.pick-ball-blue{background:rgba(33,150,243,.12);color:#1565c0;border-color:rgba(33,150,243,.25)}
.pick-ball-blue.selected{background:linear-gradient(135deg,#1565c0,#2196f3);color:#fff;border-color:#2196f3;box-shadow:0 0 10px rgba(33,150,243,.4)}
.action-row{display:flex;gap:8px;margin-top:4px}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.btn-green{background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff}
.btn-purple{background:linear-gradient(135deg,#8e44ad,#9b59b6);color:#fff}
.btn-gray{background:rgba(255,255,255,.06);color:#8899aa;border:1px solid #2a3a5c}
.btn:hover{filter:brightness(1.15)}
.note-count{font-size:11px;color:#567;margin-top:6px}
.preset-item{padding:10px 12px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:8px;border:1px solid rgba(255,255,255,.06);position:relative}
.preset-item .label{font-size:11px;color:#567;margin-bottom:4px}
.preset-item .label .dup{color:#f39c12;margin-left:6px}
.preset-balls{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.mball{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.mball-red{background:linear-gradient(135deg,#a93226,#cb4335)}
.mball-blue{background:linear-gradient(135deg,#1263a3,#1e88e5)}
.mball-sep{color:#445;font-size:14px;margin:0 1px}
.del-btn{position:absolute;right:8px;top:8px;width:22px;height:22px;border-radius:50%;border:none;background:rgba(231,76,60,.25);color:#e74c3c;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.track-section{margin-top:8px;padding:8px 10px;background:rgba(142,68,173,.08);border-radius:6px;border-left:3px solid #8e44ad}
.track-result{font-size:12px;color:#c4b8d4;margin-bottom:4px}
.track-result .win-text{color:#f1c40f;font-weight:700}
.track-progress-row{display:flex;gap:12px;font-size:11px;color:#9b59b6;flex-wrap:wrap;align-items:center}
.track-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:4px;overflow:hidden}
.track-bar-fill{height:100%;background:linear-gradient(90deg,#8e44ad,#9b59b6);border-radius:2px;transition:width .3s}
.preset-actions{display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap}
.track-btn{padding:4px 12px;border-radius:6px;border:1px solid #8e44ad;background:rgba(142,68,173,.15);color:#9b59b6;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap}
.track-btn:hover{background:rgba(142,68,173,.25)}
.track-btn.stop{border-color:#e74c3c;background:rgba(231,76,60,.12);color:#e74c3c}
.result-card{padding:12px;border-radius:10px;margin-bottom:8px;border:1px solid rgba(255,255,255,.06)}
.result-lose{background:linear-gradient(135deg,rgba(39,174,96,.08),rgba(46,204,113,.04));border-color:rgba(39,174,96,.15)}
.result-high{background:linear-gradient(135deg,rgba(231,76,60,.15),rgba(192,57,43,.08));border-color:rgba(231,76,60,.35)}
.result-win{background:linear-gradient(135deg,rgba(243,156,18,.12),rgba(241,196,15,.06));border-color:rgba(243,156,18,.25)}
.result-label{font-size:12px;color:#6b7fa3;margin-bottom:4px}
.result-prize{font-size:22px;font-weight:900}
.result-prize.lose{color:#2ecc71}
.result-prize.high{color:#e74c3c;text-shadow:0 0 12px rgba(231,76,60,.3)}
.result-prize.win{color:#f1c40f;text-shadow:0 0 12px rgba(241,196,15,.3)}
.result-amount{font-size:14px;font-weight:700;margin-top:2px}
.result-amount.fixed{color:#f1c40f}
.result-amount.variable{color:#e74c3c}
.result-amount a{color:#e74c3c;text-decoration:underline;font-weight:700}
.result-detail{font-size:12px;color:#6b7fa3;margin-top:4px}
.result-combos{margin-top:6px}
.result-combos .combo{font-size:11px;color:#8aa;padding:2px 0}
.hit .mball-red{background:linear-gradient(135deg,#f39c12,#f1c40f);color:#1a1a2e}
.hit .mball-blue{background:linear-gradient(135deg,#f39c12,#f1c40f);color:#1a1a2e}
.manual-row{margin-bottom:8px}
.manual-row input{width:100%;background:rgba(0,0,0,.3);border:1px solid #2a3a5c;border-radius:8px;padding:8px 12px;color:#e0e0e0;font-size:14px;outline:none}
.manual-row input:focus{border-color:#4a6a9c}
.manual-row input::placeholder{color:#445}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:.3s;pointer-events:none}
.toast-show{opacity:1}
.toast-success{background:rgba(39,174,96,.9);color:#fff}
.toast-error{background:rgba(231,76,60,.9);color:#fff}
.toast-info{background:rgba(52,152,219,.9);color:#fff}
.status-bar{text-align:center;color:#445;font-size:11px;padding:8px 0}
.collapsible{cursor:pointer;user-select:none}
.collapsible::after{content:' ▾';font-size:10px}
.collapsed::after{content:' ▸';font-size:10px}
.collapse-body{overflow:hidden;transition:max-height .3s ease}
.sync-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:400;margin-left:auto}
.sync-ok{background:rgba(39,174,96,.15);color:#2ecc71}
.sync-off{background:rgba(255,255,255,.06);color:#567}
.sync-pending{background:rgba(243,156,18,.15);color:#f39c12}
.mode-tabs{display:flex;gap:4px;margin-bottom:10px}
.mode-tab{flex:1;padding:6px 0;text-align:center;font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;border:1px solid #2a3a5c;background:rgba(255,255,255,.04);color:#6b7fa3;transition:.15s}
.mode-tab.active{background:rgba(243,156,18,.15);color:#f39c12;border-color:#f39c12}
.dan-label{font-size:11px;color:#f39c12;font-weight:600;margin-top:6px;margin-bottom:2px}
</style>
</head>
<body>
<div class="container">
  <div class="main-title">中奖了吗？</div>
  <div class="subtitle">大乐透 / 双色球 复式对比工具</div>
  <div class="tabs">
    <button class="tab-btn active-dlt" id="tab-dlt" onclick="switchTab('dlt')">大乐透</button>
    <button class="tab-btn" id="tab-ssq" onclick="switchTab('ssq')">双色球</button>
  </div>
  <div class="card">
    <h3><span class="h3-left">最新开奖 <span class="badge badge-dlt" id="latest-badge">大乐透</span></span><button class="refresh-btn" onclick="hardRefresh()">刷新</button></h3>
    <div id="latest-info"><div class="no-data">获取中...</div></div>
  </div>
  <div class="card">
    <h3 class="collapsible" onclick="toggleCollapse('picker-body')"><span class="h3-left">添加号码</span></h3>
    <div id="picker-body" class="collapse-body">
      <div class="mode-tabs">
        <button class="mode-tab active" id="mode-normal" onclick="setPickMode('normal')">普通/复式</button>
        <button class="mode-tab" id="mode-dantuo" onclick="setPickMode('dantuo')">胆拖</button>
      </div>
      <!-- 普通模式 -->
      <div id="picker-normal">
        <div class="ball-picker-label"><span id="front-label">前区（选5-18个，超5为复式）</span><span id="front-count">已选 0/35</span></div>
        <div class="ball-picker" id="front-picker"></div>
        <div class="ball-picker-label"><span id="back-label">后区（选2-12个，超2为复式）</span><span id="back-count">已选 0/12</span></div>
        <div class="ball-picker" id="back-picker"></div>
      </div>
      <!-- 胆拖模式 -->
      <div id="picker-dantuo" style="display:none">
        <div class="dan-label" id="dan-front-label">前区胆码（1-4个）</div>
        <div class="ball-picker-label"><span>胆码</span><span id="dan-front-count">已选 0/35</span></div>
        <div class="ball-picker" id="dan-front-picker"></div>
        <div class="ball-picker-label"><span>拖码</span><span id="tuo-front-count">已选 0/35</span></div>
        <div class="ball-picker" id="tuo-front-picker"></div>
        <div class="dan-label" id="dan-back-label">后区胆码（0-1个）</div>
        <div class="ball-picker-label"><span>胆码</span><span id="dan-back-count">已选 0/12</span></div>
        <div class="ball-picker" id="dan-back-picker"></div>
        <div class="ball-picker-label"><span>拖码</span><span id="tuo-back-count">已选 0/12</span></div>
        <div class="ball-picker" id="tuo-back-picker"></div>
      </div>
      <div class="note-count" id="note-count"></div>
      <div class="action-row">
        <button class="btn btn-green" onclick="addPreset()">确认添加</button>
        <button class="btn btn-gray" onclick="clearPicker()">清空</button>
      </div>
    </div>
  </div>
  <div class="card">
    <h3 class="collapsible" onclick="toggleCollapse('preset-body')"><span class="h3-left">我的号码 <span id="preset-total" style="font-size:11px;color:#567"></span></span><span class="h3-left"><button class="refresh-btn" onclick="event.stopPropagation();syncToCloud()">同步</button> <span class="sync-badge" id="sync-badge">未同步</span></span></h3>
    <div id="preset-body" class="collapse-body">
      <div id="preset-list"></div>
    </div>
  </div>
  <div class="card">
    <h3><span class="h3-left">对比结果</span><button class="refresh-btn" onclick="hardRefresh()">刷新</button></h3>
    <div id="result-list"></div>
  </div>
  <div class="card">
    <h3 class="collapsible collapsed" onclick="toggleCollapse('manual-body')"><span class="h3-left">手动查询</span></h3>
    <div id="manual-body" class="collapse-body" style="max-height:0">
      <div class="manual-row"><input id="manual-period" placeholder="期号，如 26073"></div>
      <div class="manual-row"><input id="manual-numbers" placeholder="开奖号码，如 04 10 22 23 33 + 02 12"></div>
      <button class="btn btn-purple" onclick="manualCompare()">查询对比</button>
    </div>
  </div>
  <div class="status-bar" id="status-bar">数据来源：中国体彩网 / 中国福彩网</div>
</div>
<div class="toast" id="toast"></div>
<script>
const CONFIG = {
  dlt: {name:'大乐透',frontMin:5,frontMax:35,frontNeed:5,backMin:2,backMax:12,backNeed:2,frontName:'前区',backName:'后区'},
  ssq: {name:'双色球',frontMin:6,frontMax:33,frontNeed:6,backMin:1,backMax:16,backNeed:1,frontName:'红球',backName:'蓝球'}
};
const PRIZE_INFO = {
  dlt: {1:{name:'一等奖',variable:true},2:{name:'二等奖',variable:true},3:{name:'三等奖',amount:10000},4:{name:'四等奖',amount:3000},5:{name:'五等奖',amount:300},6:{name:'六等奖',amount:200},7:{name:'七等奖',amount:100},8:{name:'八等奖',amount:15},9:{name:'九等奖',amount:5}},
  ssq: {1:{name:'一等奖',variable:true},2:{name:'二等奖',variable:true},3:{name:'三等奖',amount:3000},4:{name:'四等奖',amount:200},5:{name:'五等奖',amount:10},6:{name:'六等奖',amount:5}}
};
const GH_API = 'https://api.github.com/repos/sixhalls/lottery-checker/contents/presets.json';
const PRESETS_URL = 'https://sixhalls.github.io/lottery-checker/presets.json';
const GH_TOKEN_KEY = 'lottery_gh_token'; // 用户手动输入，不硬编码
const DEVICE_ID_KEY = 'lottery_device_id';
function getDeviceId(){return navigator.userAgent.length+'_'+screen.width+'x'+screen.height+'_'+navigator.language;}
function checkDeviceChange(){
  const cur=getDeviceId(),saved=localStorage.getItem(DEVICE_ID_KEY);
  if(saved&&saved!==cur){
    localStorage.removeItem(GH_TOKEN_KEY);
    localStorage.setItem(DEVICE_ID_KEY,cur);
    return true;
  }
  if(!saved)localStorage.setItem(DEVICE_ID_KEY,cur);
  return false;
}
let currentGame='dlt', selectedFront=new Set(), selectedBack=new Set();
let pickMode='normal'; // 'normal' or 'dantuo'
let danFront=new Set(), tuoFront=new Set(), danBack=new Set(), tuoBack=new Set();
let latestData = {dlt: { period: '26079', date: '2026-07-15', front: [6,8,23,26,27], back: [5,12] },ssq: { period: '2026081', date: '2026-07-16', red: [6,10,12,15,24,27], blue: [12] }};
let cloudPresets = {dlt:[],ssq:[]};
let cloudLoaded = false;

function combinations(arr,k){if(k===0)return[[]];if(arr.length<k)return[];const[f,...r]=arr;return[...combinations(r,k-1).map(c=>[f,...c]),...combinations(r,k)];}
function C(n,k){if(k>n||k<0)return 0;if(k===0||k===n)return 1;let r=1;for(let i=0;i<k;i++)r=r*(n-i)/(i+1);return Math.round(r)}

function prizeDLT(f,b){
  if(f===5&&b===2)return{level:1,...PRIZE_INFO.dlt[1]};
  if(f===5&&b===1)return{level:2,...PRIZE_INFO.dlt[2]};
  if(f===5&&b===0)return{level:3,...PRIZE_INFO.dlt[3]};
  if(f===4&&b===2)return{level:4,...PRIZE_INFO.dlt[4]};
  if(f===4&&b===1)return{level:5,...PRIZE_INFO.dlt[5]};
  if(f===3&&b===2)return{level:6,...PRIZE_INFO.dlt[6]};
  if(f===4&&b===0)return{level:7,...PRIZE_INFO.dlt[7]};
  if((f===3&&b===1)||(f===2&&b===2))return{level:8,...PRIZE_INFO.dlt[8]};
  if((f===3&&b===0)||(f===2&&b===1)||(f===1&&b===2)||(f===0&&b===2))return{level:9,...PRIZE_INFO.dlt[9]};
  return{level:0,name:'未中奖'};
}
function prizeSSQ(r,b){
  if(r===6&&b===1)return{level:1,...PRIZE_INFO.ssq[1]};
  if(r===6&&b===0)return{level:2,...PRIZE_INFO.ssq[2]};
  if(r===5&&b===1)return{level:3,...PRIZE_INFO.ssq[3]};
  if((r===5&&b===0)||(r===4&&b===1))return{level:4,...PRIZE_INFO.ssq[4]};
  if((r===4&&b===0)||(r===3&&b===1))return{level:5,...PRIZE_INFO.ssq[5]};
  if((r===2&&b===1)||(r===1&&b===1)||(r===0&&b===1))return{level:6,...PRIZE_INFO.ssq[6]};
  return{level:0,name:'未中奖'};
}
function compareAll(uF,uB,dF,dB,game,pMode,danF,danB){
  const cfg=CONFIG[game];
  let fC,bC;
  if(pMode==='dantuo'){
    // 胆码必选，从拖码中选剩余个数
    const dF=danF||[],dB=danB||[];
    const needF=cfg.frontNeed-dF.length, needB=cfg.backNeed-dB.length;
    fC=combinations(uF,needF).map(c=>[...dF,...c].sort((a,b)=>a-b));
    bC=combinations(uB,needB).map(c=>[...dB,...c].sort((a,b)=>a-b));
  }else{
    fC=combinations(uF,cfg.frontNeed);
    bC=combinations(uB,cfg.backNeed);
  }
  let results=[],bestLevel=99;
  for(const fc of fC)for(const bc of bC){
    const fh=fc.filter(n=>dF.includes(n)).length,bh=bc.filter(n=>dB.includes(n)).length;
    const prize=game==='dlt'?prizeDLT(fh,bh):prizeSSQ(fh,bh);
    if(prize.level>0){results.push({front:fc,back:bc,frontHit:fh,backHit:bh,...prize});if(prize.level<bestLevel)bestLevel=prize.level;}
  }
  return{results,bestLevel:bestLevel<99?bestLevel:0};
}
function parseDrawNumbers(str){
  if(str.includes('+')){const parts=str.split('+').map(p=>p.trim());const m=parts[0].split(/[\s,，]+/).filter(Boolean).map(Number),b=parts[1].split(/[\s,，]+/).filter(Boolean).map(Number);if(m.some(isNaN)||b.some(isNaN))return null;return{main:m,back:b};}
  const nums=str.split(/[\s,，]+/).filter(Boolean).map(Number);
  if(nums.some(isNaN))return null;
  if(currentGame==='dlt'){if(nums.length>=7)return{main:nums.slice(0,5),back:nums.slice(5,7)};}
  else{if(nums.length>=7)return{main:nums.slice(0,6),back:nums.slice(6,7)};}
  return null;
}
function getPreset(){
  try{return JSON.parse(localStorage.getItem('lottery_v2_'+currentGame)||'[]');}catch{return[];}
}
function savePreset(d){
  localStorage.setItem('lottery_v2_'+currentGame,JSON.stringify(d));
  if(cloudLoaded){cloudPresets[currentGame]=d.map(p=>({...p,track:null}));} // 云端不存track
}
function formatMoney(n){if(n>=10000)return(n/10000).toFixed(1)+'万';return n.toString();}
function arraysEqual(a,b){if(!a||!b||a.length!==b.length)return false;for(let i=0;i<a.length;i++)if(a[i]!==b[i])return false;return true;}
function calcPeriodPrize(results,game){let total=0;for(const r of results){const info=PRIZE_INFO[game][r.level];if(info&&info.amount)total+=info.amount;}return total;}
function switchTab(game){
  currentGame=game;
  document.getElementById('tab-dlt').className=game==='dlt'?'tab-btn active-dlt':'tab-btn';
  document.getElementById('tab-ssq').className=game==='ssq'?'tab-btn active-ssq':'tab-btn';
  selectedFront.clear();selectedBack.clear();
  buildPickers();renderLatest();renderPreset();renderResults();
}
function setPickMode(mode){
  pickMode=mode;
  document.getElementById('mode-normal').className='mode-tab'+(mode==='normal'?' active':'');
  document.getElementById('mode-dantuo').className='mode-tab'+(mode==='dantuo'?' active':'');
  document.getElementById('picker-normal').style.display=mode==='normal'?'':'none';
  document.getElementById('picker-dantuo').style.display=mode==='dantuo'?'':'none';
  if(mode==='dantuo'){buildDantuoPickers();}
  else{buildPickers();}
}
function buildDantuoPickers(){
  const cfg=CONFIG[currentGame];
  const maxDanF=cfg.frontNeed-1, maxDanB=cfg.backNeed-1;
  document.getElementById('dan-front-label').textContent=cfg.frontName+'胆码（1-'+maxDanF+'个）';
  document.getElementById('dan-back-label').textContent=cfg.backName+'胆码（0-'+(maxDanB>0?maxDanB:0)+'个）';
  // 胆码前区

function toggleDantuo(area,num){
  const sets={danFront,tuoFront,danBack,tuoBack};
  const s=sets[area];
  if(s.has(num))s.delete(num);

    // 互斥：胆码和拖码不能同时选同一个号
    const peer=area==='danFront'?'tuoFront':area==='tuoFront'?'danFront':area==='danBack'?'tuoBack':'danBack';
    if(sets[peer].has(num))return; // 对方已选，忽略
    s.add(num);
  }
  buildDantuoPickers();
}

function startTrack(idx){
  const presets=getPreset();
  const p=presets[idx];if(!p)return;
  const d=latestData[currentGame];
  if(!d.period){showToast('请先获取最新开奖数据','error');return;}
  const isDLT=currentGame==='dlt';
  let periods=1;
  if(isDLT){
    const input=prompt('输入追号期数（1-99）：','5');
    if(!input)return;
    periods=parseInt(input);
    if(!periods||periods<1||periods>99){showToast('请输入1-99的期数','error');return;}
  }
  const curNum=parseInt(d.period.replace(/\D/g,''));
  const startNum=curNum+1;
  const startPeriod=String(startNum);
  const endNum=startNum+periods-1;
  const endPeriod=String(endNum);
  p.track={enabled:true,totalPeriods:periods,startPeriod:startPeriod,endPeriod:endPeriod,history:[]};
  checkTrackPeriod(p,d);
  savePreset(presets);renderPreset();
  showToast('追号已开启：'+startPeriod+' → '+endPeriod+'，共'+periods+'期','success');
}
function stopTrack(idx){
  const presets=getPreset();
  if(presets[idx]){presets[idx].track=null;savePreset(presets);renderPreset();showToast('追号已停止','info');}
}
function checkTrackPeriod(p,drawData){
  if(!p.track||!p.track.enabled)return;
  const game=currentGame;
  const period=drawData.period;
  if(p.track.history.find(h=>h.period===period))return;
  const dF=game==='dlt'?drawData.front:drawData.red;
  const dB=game==='dlt'?drawData.back:drawData.blue;
  const{results}=compareAll(p.front,p.back,dF,dB,game,p.mode,p.danFront,p.danBack);
  let totalPrize=0,summaryParts=[],hasVariable=false;
  if(results.length>0){
    if(results.some(r=>{const info=PRIZE_INFO[game][r.level];return info&&info.variable;}))hasVariable=true;
    const lc={};results.forEach(r=>{lc[r.name]=(lc[r.name]||0)+1;});
    summaryParts.push(Object.entries(lc).map(([n,c])=>n+'×'+c).join('，'));
  }
  totalPrize=calcPeriodPrize(results,game);
  let summary=summaryParts.length>0?summaryParts.join('；'):'未中奖';
  if(hasVariable)summary+='（含浮动）';
  p.track.history.push({period:period,prize:totalPrize,summary:summary,hasVariable:hasVariable});
  const done=p.track.history.length;
  const remain=p.track.totalPeriods-done;
  const isSSQ=game==='ssq';
  if(isSSQ){
    setTimeout(()=>{if(confirm('已开奖，是否继续追号？\n本期：'+summary+'\n累计奖金：'+formatMoney(p.track.history.reduce((s,h)=>s+(h.prize||0),0))+'元'))window.open('https://www.cwl.gov.cn/','_blank');},500);
  }else if(remain===1){
    setTimeout(()=>{if(confirm('期数还剩1期，是否去购买？\n已完成 '+done+'/'+p.track.totalPeriods+' 期'))window.open('https://www.lottery.gov.cn/','_blank');},500);
  }else if(remain===0){
    const grandTotal=p.track.history.reduce((s,h)=>s+(h.prize||0),0);
    setTimeout(()=>{if(confirm('期数全部完毕，是否去购买？\n共 '+p.track.totalPeriods+' 期已完成\n累计奖金：'+formatMoney(grandTotal)+'元'))window.open('https://www.lottery.gov.cn/','_blank');},500);
  }
}
async function syncToCloud(silent){
  if(!cloudLoaded)return;
  const badge=document.getElementById('sync-badge');
  const deviceChanged=checkDeviceChange();
  let token=localStorage.getItem(GH_TOKEN_KEY)||'';
  if(!token||deviceChanged){
    if(silent){badge.className='sync-badge sync-off';badge.textContent=deviceChanged?'需重新输入':'未同步';return;}
    token=prompt((deviceChanged?'检测到新设备或浏览器，需重新输入同步令牌。\n\n':'首次同步需要输入GitHub Token（用于推送号码到云端）。\n\n')+'Token只会存在本地浏览器，不会上传。\n\n请在 https://github.com/settings/tokens 创建（需repo权限）：');
    if(!token){badge.className='sync-badge sync-off';badge.textContent=deviceChanged?'需重新输入':'未同步';return;}
    localStorage.setItem(GH_TOKEN_KEY,token);
  }
  badge.className='sync-badge sync-pending';badge.textContent='同步中...';
  try{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(cloudPresets,null,2))));
    const apiHeaders={'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json'};
    // 多代理轮试（CORS代理转发GitHub API）
    const proxies=[
      u=>'https://corsproxy.io/?'+encodeURIComponent(u),
      u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
      u=>'https://api.codetabs.com/v1/proxy/?quest='+encodeURIComponent(u)
    ];
    // 获取当前SHA（防409冲突）
    let sha='';
    for(const proxy of proxies){
      try{const resp=await fetch(proxy(GH_API),{headers:apiHeaders,signal:AbortSignal.timeout(8000)});if(resp.ok){const j=await resp.json();if(j.sha){sha=j.sha;break;}}}catch(e){}
    }
    const body={message:'auto: sync presets',content:content};
    if(sha)body.sha=sha;
    // 写入presets.json（轮试代理）
    let writeOk=false;
    for(const proxy of proxies){
      try{
        const resp=await fetch(proxy(GH_API),{method:'PUT',headers:{...apiHeaders,'Content-Type':'application/json'},body:JSON.stringify(body),signal:AbortSignal.timeout(12000)});
        if(resp.ok){writeOk=true;break;}
        // 检测真实错误码
        let txt='';try{txt=await resp.text();}catch(e){}
        if(txt.includes('"message"')&&(txt.includes('409')||txt.includes('sha'))){continue;} // SHA冲突，试下一个
        if(txt.includes('401')||txt.includes('403')){localStorage.removeItem(GH_TOKEN_KEY);badge.className='sync-badge sync-off';badge.textContent='Token无效';showToast('Token无效或权限不足，请重新输入','error');return;}
      }catch(e){continue;}
    }
    if(writeOk){badge.className='sync-badge sync-ok';badge.textContent='已同步';if(!silent)showToast('号码已同步到云端','success');}
    else{badge.className='sync-badge sync-off';badge.textContent='同步失败';if(!silent)showToast('同步失败：代理均不可用，请稍后重试','error');}
  }catch(e){badge.className='sync-badge sync-off';badge.textContent='同步失败';if(!silent)showToast('同步失败：'+e.message,'error');}
}
async function loadCloudPresets(){
  const badge=document.getElementById('sync-badge');
  let remoteData=null;
  // 先尝试直连
  try{
    const resp=await fetch(PRESETS_URL+'?t='+Date.now());
    if(resp.ok){const data=await resp.json();if(data.dlt||data.ssq)remoteData=data;}
  }catch(e){}
  // 直连失败时通过CORS代理
  if(!remoteData){
    try{
      const resp=await fetch('https://corsproxy.io/?'+encodeURIComponent(PRESETS_URL),{signal:AbortSignal.timeout(10000)});
      if(resp.ok){const data=await resp.json();if(data.dlt||data.ssq)remoteData=data;}
    }catch(e){}
  }
  if(remoteData){
    cloudPresets={dlt:remoteData.dlt||[],ssq:remoteData.ssq||[]};
    cloudLoaded=true;
    // 合并云端号码到localStorage，保留本地追号状态
    ['dlt','ssq'].forEach(g=>{
      const cloud=cloudPresets[g]||[];
      try{
        const local=JSON.parse(localStorage.getItem('lottery_v2_'+g)||'[]');
        // 以云端号码为基准，逐条合并：保留本地track
        const merged=cloud.map((cp,ci)=>{
          // 找本地同位置同号码的preset
          const match=local.find(lp=>arraysEqual(lp.front,cp.front)&&arraysEqual(lp.back,cp.back));
          return{...cp,track:match?match.track:(local[ci]?local[ci].track:null)};
        });
        // 本地多余的不在云端的也保留
        local.forEach(lp=>{
          if(!cloud.some(cp=>arraysEqual(cp.front,lp.front)&&arraysEqual(cp.back,lp.back))){
            // 检查是否已在merged中
            if(!merged.some(m=>arraysEqual(m.front,lp.front)&&arraysEqual(m.back,lp.back))){
              merged.push(lp);
            }
          }
        });
        localStorage.setItem('lottery_v2_'+g,JSON.stringify(merged));
      }catch(e){
        // localStorage无数据，直接用云端（无track）
        localStorage.setItem('lottery_v2_'+g,JSON.stringify(cloud.map(p=>({...p,track:null}))));
      }
    });
    badge.className='sync-badge sync-ok';badge.textContent='已同步';
    return true;
  }
  badge.className='sync-badge sync-off';badge.textContent='未同步';
  return false;
}

        let ft=0;results.forEach(r=>{const info=PRIZE_INFO[currentGame][r.level];if(info&&info.amount)ft+=info.amount;});
        let txt='<div class="result-amount fixed">固定奖金 '+formatMoney(ft)+' 元';
        if(hasVariable)txt+=' <span style="color:#e74c3c;font-size:12px">（另含浮动奖金，去官网查）</span>';
        txt+='</div>';amountH=txt;
      }
    }
    let comboH='';
    if(results.length>0){
      const shown=results.slice(0,10);
      comboH='<div class="result-combos">'+shown.map(r=>{
        const hF=r.front.filter(n=>dF.includes(n)),hB=r.back.filter(n=>dB.includes(n));
        return'<div class="combo">'+ballHTML(r.front,'red',hF)+'<span class="mball-sep">+</span>'+ballHTML(r.back,'blue',hB)+' → '+r.name+'</div>';
      }).join('');
      if(results.length>10)comboH+='<div class="combo" style="color:#f39c12">...还有'+(results.length-10)+'注中奖</div>';
      comboH+='</div>';
    }
    let summaryH='';
    if(results.length>0){const lc={};results.forEach(r=>{lc[r.name]=(lc[r.name]||0)+1;});summaryH=Object.entries(lc).map(([n,c])=>n+'×'+c).join('，');}
    let notes,modeTag;
    if(p.mode==='dantuo'){const dF=p.danFront||[],dB=p.danBack||[];notes=C(p.front.length,cfg.frontNeed-dF.length)*C(p.back.length,cfg.backNeed-dB.length);modeTag='胆拖';}else{notes=C(p.front.length,cfg.frontNeed)*C(p.back.length,cfg.backNeed);modeTag=notes>1?'复式':'';}
    return'<div class="'+cardClass+'"><div class="result-label">第'+(i+1)+'组 — 第 '+period+' 期'+(notes>1?' ('+notes+'注'+modeTag+')':'')+'</div><div class="'+prizeClass+'">'+pn+'</div>'+amountH+'<div class="result-detail">'+(summaryH?'中奖汇总：'+summaryH:cfg.frontName+'命中0 + '+cfg.backName+'命中0')+'</div>'+comboH+'</div>';
  }).join('');
}
function addPreset(){
  const cfg=CONFIG[currentGame];
  if(pickMode==='dantuo'){
    const maxDanF=cfg.frontNeed-1, maxDanB=cfg.backNeed-1;
    const needTuoF=cfg.frontNeed-danFront.size, needTuoB=cfg.backNeed-danBack.size;
    if(danFront.size<1){showToast(cfg.frontName+'胆码至少选1个','error');return;}
    if(danFront.size>maxDanF){showToast(cfg.frontName+'胆码最多'+maxDanF+'个','error');return;}
    if(danBack.size>maxDanB&&maxDanB>=0){showToast(cfg.backName+'胆码最多'+maxDanB+'个','error');return;}
    if(tuoFront.size<needTuoF){showToast(cfg.frontName+'拖码至少选'+needTuoF+'个','error');return;}
    if(tuoBack.size<needTuoB){showToast(cfg.backName+'拖码至少选'+needTuoB+'个','error');return;}
    const presets=getPreset();
    presets.push({mode:'dantuo',danFront:[...danFront].sort((a,b)=>a-b),front:[...tuoFront].sort((a,b)=>a-b),danBack:[...danBack].sort((a,b)=>a-b),back:[...tuoBack].sort((a,b)=>a-b),track:null});
    savePreset(presets);clearPicker();renderPreset();renderResults();syncToCloud(true);
    showToast('胆拖号码已添加','success');
  }else{
    if(selectedFront.size<cfg.frontMin){showToast(cfg.frontName+'至少选'+cfg.frontMin+'个','error');return;}
    if(selectedBack.size<cfg.backMin){showToast(cfg.backName+'至少选'+cfg.backMin+'个','error');return;}
    const presets=getPreset();
    presets.push({mode:'normal',front:[...selectedFront].sort((a,b)=>a-b),back:[...selectedBack].sort((a,b)=>a-b),track:null});
    savePreset(presets);clearPicker();renderPreset();renderResults();syncToCloud(true);
    showToast('号码已添加','success');
  }
}
function delPreset(i){
  const p=getPreset();p.splice(i,1);savePreset(p);renderPreset();renderResults();syncToCloud(true);
}
function manualCompare(){
  const period=document.getElementById('manual-period').value.trim(),numStr=document.getElementById('manual-numbers').value.trim();
  if(!period||!numStr){showToast('请输入期号和号码','error');return;}
  const parsed=parseDrawNumbers(numStr);if(!parsed){showToast('号码格式错误','error');return;}
  renderResults(parsed,period);showToast('对比完成','info');
}
function toggleCollapse(id){
  const el=document.getElementById(id),h3=el.previousElementSibling;
  if(el.style.maxHeight==='0px'){el.style.maxHeight=el.scrollHeight+500+'px';h3.classList.remove('collapsed');}
  else{el.style.maxHeight='0px';h3.classList.add('collapsed');}
}
function hardRefresh(){
  showToast('正在刷新页面...','info');
  // 强制绕过缓存重新加载页面（嵌入式数据由GitHub Actions定时更新）
  location.href = location.pathname + '?t=' + Date.now();
}
async function fetchLatest(){
  const sb=document.getElementById('status-bar');sb.textContent='刷新数据中...';
  // 先尝试直接CORS获取（PC浏览器可能成功）
  try{
    if(currentGame==='dlt')await fetchDLT();else await fetchSSQ();
    renderLatest();renderResults();
    const presets=getPreset();
    let trackUpdated=false;
    for(const p of presets){if(p.track&&p.track.enabled){const d=latestData[currentGame];if(d.period){checkTrackPeriod(p,d);trackUpdated=true;}}}
    if(trackUpdated){savePreset(presets);renderPreset();syncToCloud(true);}
    sb.textContent='数据已更新';
    return;
  }catch(e){}
  // CORS失败时：触发GitHub Actions更新嵌入式数据，然后reload页面
  sb.textContent='CORS受限，正在通过云端更新...';
  try{
    // 触发GitHub Actions工作流
    const r=await fetch('https://api.github.com/repos/sixhalls/lottery-checker/actions/workflows/lottery.yml/dispatches',{method:'POST',headers:{'Accept':'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify({ref:'main'})});
    if(r.ok||r.status===204){
      showToast('已触发云端更新，约1分钟后刷新页面','info');
      sb.textContent='云端更新已触发，等待60秒后刷新...';
      setTimeout(()=>location.reload(true),60000);
    }else{
      // 无token时直接reload，用嵌入式数据
      showToast('将刷新页面获取最新数据','info');
      setTimeout(()=>location.reload(true),500);
    }
  }catch(e){
    showToast('将刷新页面获取最新数据','info');
    setTimeout(()=>location.reload(true),500);
  }
}
async function fetchDLT(){
  const urls=['https://webapi.sporttery.cn/gateway/lottery/getHistoryPageListV1.qry?gameNo=85&provinceId=0&pageSize=3&is498=true','https://www.js-lottery.com/wfzq/dlt/data','https://m.55125.cn/kaijiang/dlt/'];
  for(const url of urls){try{
    const text=await fetchCORS(url);if(!text)continue;
    try{const json=JSON.parse(text);if(json.value&&json.value.lstLotteryDrawInfo&&json.value.lstLotteryDrawInfo.length>0){const item=json.value.lstLotteryDrawInfo[0];const nums=item.lotteryDrawResult.split(/\s+/).map(Number);if(nums.length>=7){latestData.dlt={period:item.lotteryDrawNum,date:item.lotteryDrawTime||'',front:nums.slice(0,5),back:nums.slice(5,7)};localStorage.setItem('lottery_cache_dlt',JSON.stringify(latestData.dlt));document.getElementById('status-bar').textContent='大乐透数据已更新 '+latestData.dlt.period+'期';return;}}}catch(e){}
    const m1=text.match(/text-align:center[^>]*>(\d{4}-\d{2}-\d{2})<\/td>\s*<td[^>]*>(\d{5,6})<\/td>\s*<td[^>]*>\s*([\d\s]+?)\s*<\/td>/);
    if(m1){const nums=m1[3].trim().split(/\s+/).map(Number);if(nums.length>=7){latestData.dlt={period:m1[2],date:m1[1],front:nums.slice(0,5),back:nums.slice(5,7)};localStorage.setItem('lottery_cache_dlt',JSON.stringify(latestData.dlt));document.getElementById('status-bar').textContent='大乐透数据已更新 '+latestData.dlt.period+'期';return;}}
    const m2=text.match(/(\d{5,6})[^\d]*(\d{2})\s*(\d{2})\s*(\d{2})\s*(\d{2})\s*(\d{2})\s*(\d{2})\s*(\d{2})\s*(\d{2})/);
    if(m2){latestData.dlt={period:m2[1],date:'',front:[Number(m2[2]),Number(m2[3]),Number(m2[4]),Number(m2[5]),Number(m2[6])],back:[Number(m2[7]),Number(m2[8])]};localStorage.setItem('lottery_cache_dlt',JSON.stringify(latestData.dlt));document.getElementById('status-bar').textContent='大乐透数据已更新 '+latestData.dlt.period+'期';return;}
  }catch(e){continue;}}
  throw new Error('大乐透数据源均失败');
}
async function fetchSSQ(){
  const urls=['https://www.cwl.gov.cn/cwl_admin/front/cwlkj/search/kjxx/findDrawNotice?name=ssq&issueCount=3','https://m.17500.cn/win/list/lotid/ssq.html','https://kaijiang.78500.cn/ssq/'];
  for(const url of urls){try{
    const text=await fetchCORS(url);if(!text)continue;
    try{const json=JSON.parse(text);if(json.result&&json.result.length>0){const item=json.result[0];latestData.ssq={period:item.code,date:item.date||'',red:item.red.split(/[,\s]+/).map(Number),blue:[Number(item.blue)]};localStorage.setItem('lottery_cache_ssq',JSON.stringify(latestData.ssq));document.getElementById('status-bar').textContent='双色球数据已更新 '+latestData.ssq.period+'期';return;}}catch(e){}
    const m1=text.match(/(20\d{5})\s*(?:期)?[\s\S]*?(\d{2})\s*(\d{2})\s*(\d{2})\s*(\d{2})\s*(\d{2})\s*(\d{2})\s*[+\s]*(\d{2})/);
    if(m1){latestData.ssq={period:m1[1],date:'',red:[Number(m1[2]),Number(m1[3]),Number(m1[4]),Number(m1[5]),Number(m1[6]),Number(m1[7])],blue:[Number(m1[8])]};localStorage.setItem('lottery_cache_ssq',JSON.stringify(latestData.ssq));document.getElementById('status-bar').textContent='双色球数据已更新 '+latestData.ssq.period+'期';return;}
    const m2=text.match(/(\d{2})\s+(\d{2})\s+(\d{2})\s+(\d{2})\s+(\d{2})\s+(\d{2})[^\d+]*\+\s*(\d{2})/);
    if(m2){latestData.ssq={period:'',date:'',red:[Number(m2[1]),Number(m2[2]),Number(m2[3]),Number(m2[4]),Number(m2[5]),Number(m2[6])],blue:[Number(m2[7])]};localStorage.setItem('lottery_cache_ssq',JSON.stringify(latestData.ssq));document.getElementById('status-bar').textContent='双色球数据已更新';return;}
  }catch(e){continue;}}
  throw new Error('双色球数据源均失败');
}
async function fetchCORS(url){
  try{const r=await fetch(url,{mode:'cors',signal:AbortSignal.timeout(8000)});if(r.ok)return await r.text();}catch(e){}
  for(const p of[u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),u=>'https://corsproxy.io/?'+encodeURIComponent(u),u=>'https://api.codetabs.com/v1/proxy/?quest='+encodeURIComponent(u)]){try{const r=await fetch(p(url),{signal:AbortSignal.timeout(8000)});if(r.ok)return await r.text();}catch(e){continue;}}
  return null;
}
function showToast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.className='toast toast-'+type+' toast-show';setTimeout(()=>el.className='toast',2200);}
const DEFAULT_PRESETS={dlt:[],ssq:[{mode:'normal',front:[6,9,11,19,20,25],back:[12],track:null},{mode:'normal',front:[9,12,17,19,21,23],back:[6],track:null},{mode:'normal',front:[1,15,17,20,29,30],back:[15],track:null},{mode:'normal',front:[18,19,21,28,30,32],back:[7],track:null},{mode:'normal',front:[2,4,16,21,24,29],back:[7],track:null},{mode:'normal',front:[4,9,15,17,25,33],back:[14],track:null}]};
async function init(){
  const EMBEDDED={dlt: { period: '26079', date: '2026-07-15', front: [6,8,23,26,27], back: [5,12] }, ssq: { period: '2026081', date: '2026-07-16', red: [6,10,12,15,24,27], blue: [12] }};
  if(EMBEDDED.dlt.period)latestData.dlt={...EMBEDDED.dlt};
  if(EMBEDDED.ssq.period)latestData.ssq={...EMBEDDED.ssq};
  if(!latestData.dlt.period){try{const c=JSON.parse(localStorage.getItem('lottery_cache_dlt')||'null');if(c&&c.period)latestData.dlt=c;}catch{}}
  if(!latestData.ssq.period){try{const c=JSON.parse(localStorage.getItem('lottery_cache_ssq')||'null');if(c&&c.period)latestData.ssq=c;}catch{}}
  await loadCloudPresets();
  if(!cloudLoaded){
    ['dlt','ssq'].forEach(g=>{
      if(!localStorage.getItem('lottery_v2_'+g)&&DEFAULT_PRESETS[g].length>0){localStorage.setItem('lottery_v2_'+g,JSON.stringify(DEFAULT_PRESETS[g]));}
    });
  }
  buildPickers();renderLatest();renderPreset();renderResults();
  if(checkDeviceChange()&&cloudLoaded){showToast('检测到新设备，同步号码需重新输入令牌','error');}
  setInterval(()=>{if(latestData.dlt.period)localStorage.setItem('lottery_cache_dlt',JSON.stringify(latestData.dlt));if(latestData.ssq.period)localStorage.setItem('lottery_cache_ssq',JSON.stringify(latestData.ssq));},15000);
}
init();
